[build]
dockerfilePath = "Dockerfile.api"

# The app's startup event builds the schema (init_db / create_all, idempotent) AND seeds
# demo products in-process — so there's no separate seed step that could hang before
# uvicorn binds. No Alembic on Railway (agents also create tables via init_db()).
[deploy]
startCommand = "uvicorn agents.executive.hitl_api:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 90
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
