[build]
dockerfilePath = "Dockerfile.api"

# No startCommand here on purpose: Railway runs the start command as raw argv (no shell),
# so "$PORT" would NOT expand. Instead we rely on Dockerfile.api's shell-form CMD, which
# /bin/sh expands ($PORT -> the port Railway injects). The app builds the schema + seeds
# demo products in its FastAPI startup event, so no pre-step is needed.
[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 90
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
